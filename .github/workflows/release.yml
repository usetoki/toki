name: Release

# Publishes @usetoki/toki and its per-platform packages on a v* tag. Needs the NPM_TOKEN secret.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
    runs-on: ${{ matrix.os }}
    env:
      BUILD_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nasm --no-progress -y
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Append
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build addon
        shell: bash
        run: npx napi build --platform --release --target "$BUILD_TARGET" --output-dir bindings --dts index.d.ts
      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: bindings/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # Regenerates bindings/ (loader + types) for tsc, and compiles dist/.
      - run: npm run build
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Stage prebuilt binaries into platform packages
        run: npx napi artifacts --output-dir artifacts --npm-dir npm
      # prepublishOnly runs `napi prepublish`, which publishes the platform packages.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
